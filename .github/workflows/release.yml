---
name: Release

on:
  push:
    branches:
      - stable
  workflow_dispatch:

# Avoid overlapping releases racing to tag/push.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Skip the auto-generated release commit so it can't trigger another run.
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Full history + tags are required for semantic-release to
          # determine the next version from accumulated commits.
          fetch-depth: 0
          # Use the default GITHUB_TOKEN for checkout — it is always valid
          # for reading the repo the workflow runs in. semantic-release
          # authenticates its push/release separately via GH_TOKEN below.

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==2.4.1"
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true
      - name: Install dependencies
        run: poetry install --all-extras

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release
        env:
          # semantic-release uses GH_TOKEN to push commits/tags and to
          # create the GitHub Release.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          poetry run semantic-release version
          poetry run semantic-release publish
