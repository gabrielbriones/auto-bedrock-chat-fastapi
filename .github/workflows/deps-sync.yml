---
name: Deps Sync

on:
  pull_request:
    branches:
      - main
    paths:
      - poetry.lock

permissions:
  contents: write
  pull-requests: read

jobs:
  sync-requirements:
    name: Sync requirements.txt from poetry.lock
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.2 poetry-plugin-export

      - name: Export requirements.txt
        run: poetry export -f requirements.txt --without-hashes --output requirements.txt

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet requirements.txt && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated requirements.txt
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements.txt
          git commit -m "chore(deps): sync requirements.txt from poetry.lock"
          git push
